<!DOCTYPE html><!-- REACT CON IMPORTACIONES DE SCRIPT -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <div id="root"></div>

    <script type="text/babel">
        // Los mismos datos de arriba
        const platos = [
            { id: 1, nombre: "Lomo saltado", categoria: "segundos", precio: 18, stock: 3, disponible: true },
            { id: 2, nombre: "Arroz con pollo", categoria: "segundos", precio: 12, stock: 5, disponible: true },
            { id: 3, nombre: "Sopa de verduras", categoria: "entradas", precio: 8, stock: 0, disponible: false },
        ];

        // ¿Cómo se llama la función? ¿Qué recibe? ¿Qué devuelve?
        function Carta() {
            return (
                <ul>
                    {platos.map(plato => (
                        <li key={plato.id}>
                            <h2>{plato.nombre}</h2>
                            <p>S/{plato.precio}</p>
                            <p>{plato.stock}</p>
                            <p>{plato.categoria}</p>
                            <p>Estado: {plato.disponible ? "Disponible" : "Agotado"}</p>
                        </li>
                    ))}
                </ul>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<Carta />);
    </script>
</body>

</html>
