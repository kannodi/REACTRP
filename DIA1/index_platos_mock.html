<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <div id="root"></div>

    <script type="text/babel">
        // el mock 
        const platosMock = [
            { id: 1, nombre: "Lomo saltado", categoria: "segundos", precio: 18, stock: 3, disponible: true },
            { id: 2, nombre: "Arroz con pollo", categoria: "segundos", precio: 12, stock: 5, disponible: true },
            { id: 3, nombre: "Sopa de verduras", categoria: "entradas", precio: 8, stock: 0, disponible: false },
            { id: 4, nombre: "Pollo a la brasa", categoria: "segundos", precio: 20, stock: 4, disponible: true },
            { id: 5, nombre: "Jugo de naranja", categoria: "bebidas", precio: 5, stock: 8, disponible: true },
        ];

        function PlatoCard({ nombre, categoria, precio, stock, disponible }) {
            return (
                <li>
                    <h2>{nombre}</h2>
                    <p>S/{precio}</p>
                    <p>{stock}</p>
                    <p>{categoria}</p>
                    <p>Estado: {disponible ? "Disponible" : "Agotado"}</p>
                </li>
            );
        }

        function Carta() {
            return (
                <ul>
                    {platosMock.map(plato => (
                        <PlatoCard
                            key={plato.id}
                            nombre={plato.nombre}
                            categoria={plato.categoria}
                            precio={plato.precio}
                            stock={plato.stock}
                            disponible={plato.disponible}
                        />
                    ))}
                </ul>
            );
        }








        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<PlatoCard />);
    </script>
</body>

</html>
