<!DOCTYPE html><!--Bloque A (DOM puro con renderCarta) -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button id="btnrendercarta">Renderizar carta</button>
    <input type="text" id="nombre" placeholder="Nombre del plato">
    <button id="btnAgregar">Agregar plato</button>
    <div id="carta"></div>
    <script>
        let platos = [
            { id: 1, nombre: "Lomo saltado", categoria: "segundos", precio: 18, stock: 3, disponible: true },
            { id: 2, nombre: "Arroz con pollo", categoria: "segundos", precio: 12, stock: 5, disponible: true },
            { id: 3, nombre: "Sopa de verduras", categoria: "entradas", precio: 8, stock: 0, disponible: false },
        ];
        function renderCarta(carta) {
            carta.innerHTML = "";
            html = "<ul>";
            for (let i = 0; i < platos.length; i++) {
                const plato = platos[i];
                html += `
                <li>
                    <h2>${plato.nombre}</h2>
                    <p>${plato.categoria}</p>
                    <p>${plato.precio}</p>
                    <p>${plato.stock}</p>
                    <p>${plato.disponible}</p>
                </li>
                `;
            }
            html += "</ul>";
            carta.innerHTML = html;
        }
        function agregarPlato() {
            carta.innerHTML = "";
            const plato = {
                id: platos.length + 1,
                nombre: document.getElementById("nombre").value,
                categoria: "segundos",
                precio: 18,
                stock: 3,
                disponible: true
            }
            platos.push(plato);
            renderCarta(document.getElementById("carta"));
        }

        document.getElementById("btnrendercarta").addEventListener("click", () => {
            renderCarta(document.getElementById("carta"));
        });
        document.getElementById("btnAgregar").addEventListener("click", () => {
            agregarPlato(document.getElementById("nombre").value);
        })
    </script>




</body>

</html>
